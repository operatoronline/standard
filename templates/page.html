<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{{TITLE}} | Standard</title>
    <meta name="description" content="{{META_DESCRIPTION}}">
    <link rel="canonical" href="{{CANONICAL_URL}}">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{TITLE}} | Standard">
    <meta property="og:description" content="{{META_DESCRIPTION}}">
    <meta property="og:url" content="{{OG_URL}}">
    <meta property="og:site_name" content="Standard Design System">
    <meta property="og:image" content="{{SITE_URL}}/assets/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Standard Design System">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{TITLE}} | Standard">
    <meta name="twitter:description" content="{{META_DESCRIPTION}}">
    <meta name="twitter:image" content="{{SITE_URL}}/assets/og-image.png">

    <!-- Preload critical fonts (latin subsets) to eliminate FOIT/FOUT -->
    <link rel="preload" href="{{REL_ROOT}}assets/fonts/outfit-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="{{REL_ROOT}}assets/fonts/instrument-serif-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="{{REL_ROOT}}assets/fonts/instrument-serif-italic-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="{{REL_ROOT}}vendor/normalize.css">
    <link rel="stylesheet" href="{{REL_ROOT}}vendor/phosphor/regular/style.css">
    <link rel="stylesheet" href="{{REL_ROOT}}vendor/phosphor/bold/style.css">
    <link rel="stylesheet" href="{{REL_ROOT}}vendor/phosphor/fill/style.css">
    <link rel="stylesheet" href="{{REL_ROOT}}vendor/phosphor/duotone/style.css">
    <link rel="stylesheet" href="{{REL_ROOT}}styles/{{CSS_FILE}}">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to content</a>
    <div class="app">
        <!-- Floating Pill Nav (Mobile: bottom, Desktop: top) -->
        <nav class="fnav" id="fnav" role="navigation" aria-label="Main navigation">
            <a href="{{REL_ROOT}}index.html" class="fnav-btn" data-section="home" aria-label="Home">
                <i class="ph-bold ph-house" aria-hidden="true"></i>
                <span>Home</span>
            </a>
            <a href="{{REL_ROOT}}tokens/colors.html" class="fnav-btn" data-section="tokens" aria-label="Tokens">
                <i class="ph-bold ph-palette" aria-hidden="true"></i>
                <span>Tokens</span>
            </a>
            <a href="{{REL_ROOT}}components/buttons.html" class="fnav-btn" data-section="components" aria-label="Components">
                <i class="ph-bold ph-stack" aria-hidden="true"></i>
                <span>Components</span>
            </a>
            <a href="{{REL_ROOT}}patterns/layouts.html" class="fnav-btn" data-section="patterns" aria-label="Patterns">
                <i class="ph-bold ph-grid-four" aria-hidden="true"></i>
                <span>Patterns</span>
            </a>
            <div class="fnav-sep" role="separator" aria-hidden="true"></div>
            <button class="fnav-btn" id="search-toggle" aria-label="Search" type="button">
                <i class="ph-bold ph-magnifying-glass" aria-hidden="true"></i>
            </button>
            <button class="fnav-btn" id="theme-btn" aria-label="Toggle theme" type="button">
                <i class="ph-bold ph-moon" aria-hidden="true"></i>
            </button>
        </nav>

        <!-- Glassmorphism Top Bar (Desktop only) -->
        <header class="top-bar" role="banner">
            <div class="top-bar-left">
                <a href="{{REL_ROOT}}index.html" class="logo" aria-label="Standard Design System — Home">
                    <i class="ph ph-intersect" aria-hidden="true"></i>
                    <span>Standard</span>
                </a>
            </div>
            <div class="top-bar-right">
                <div class="search-container" id="search-container" role="search">
                    <i class="ph ph-magnifying-glass" aria-hidden="true"></i>
                    <input type="text" id="search-input" placeholder="Search components..." aria-label="Search components" autocomplete="off" aria-controls="search-results" aria-expanded="false" aria-autocomplete="list" role="combobox">
                    <div class="search-results" id="search-results" role="listbox"></div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="container">
            <main class="main-content" id="main-content" tabindex="-1">
                <header class="page-header">
                    <nav class="breadcrumbs" aria-label="Breadcrumb">
                        {{BREADCRUMBS_HTML}}
                    </nav>
                    <h1>{{TITLE_DISPLAY}}</h1>
                </header>
                
                <article class="prose">
                    {{CONTENT_HTML}}
                </article>

                <footer class="page-footer" role="contentinfo">
                    <p>Standard {{VERSION}} • Last built: {{LAST_BUILT}}</p>
                </footer>
            </main>
        </div>
    </div>

    <script src="{{REL_ROOT}}vendor/fuse.min.js"></script>
    <script src="{{REL_ROOT}}vendor/prism/prism.min.js"></script>
    <script src="{{REL_ROOT}}vendor/prism/prism-markup.min.js"></script>
    <script src="{{REL_ROOT}}vendor/prism/prism-css.min.js"></script>
    <script src="{{REL_ROOT}}vendor/prism/prism-javascript.min.js"></script>
    <!-- Screen reader live region for dynamic announcements -->
    <div id="a11y-announcer" class="sr-only" aria-live="polite" aria-atomic="true"></div>
    <script src="{{REL_ROOT}}scripts/{{JS_FILE}}"></script>
</body>
</html>
